openapi: 3.1.0
info:
  title: Liquity Protocol API
  description: >
    The Liquity static JSON API at api.liquity.org covers circulating supplies,
    protocol stats, stability pool data, prices, governance epochs, yield
    opportunities, borrow rates, and a points leaderboard. Data is generated
    on-chain and published as flat files to GitHub Pages. Liquity V1 issues
    LUSD stablecoin backed by ETH. Liquity V2 (BOLD) supports multi-collateral
    borrowing with WETH, wstETH, and rETH.
  version: 1.0.0
  contact:
    name: Liquity Team
    url: https://www.liquity.org/
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://www.liquity.org/terms
externalDocs:
  description: Liquity API GitHub Repository
  url: https://github.com/liquity/api.liquity.org
servers:
  - url: https://api.liquity.org
    description: Liquity API (GitHub Pages)

paths:
  /v1/lusd_total_supply.txt:
    get:
      operationId: getLusdTotalSupply
      summary: LUSD Total Supply
      description: >
        Returns the current total supply of LUSD stablecoin as a plaintext
        decimal number, derived from on-chain contract state via Ethers.js.
      tags:
        - V1 Supply
      responses:
        "200":
          description: LUSD total supply as a plaintext number.
          content:
            text/plain:
              schema:
                type: string
                description: Decimal numeric string representing total LUSD supply.
                example: "142857123456789000000000000"

  /v1/lqty_circulating_supply.txt:
    get:
      operationId: getLqtyCirculatingSupply
      summary: LQTY Circulating Supply
      description: >
        Returns the current circulating supply of LQTY governance token as a
        plaintext decimal number.
      tags:
        - V1 Supply
      responses:
        "200":
          description: LQTY circulating supply as a plaintext number.
          content:
            text/plain:
              schema:
                type: string
                description: Decimal numeric string representing LQTY circulating supply.
                example: "85000000000000000000000000"

  /v1/lusd_cb_bamm_stats.json:
    get:
      operationId: getLusdChickenBondsBammStats
      summary: LUSD Chicken Bonds BAMM Stats
      description: >
        Returns JSON with BAMM (B.AMM) debt and 7-day, 14-day, and 30-day APR
        figures for the LUSD Chicken Bonds stability pool integration with
        B.Protocol.
      tags:
        - V1 Supply
      responses:
        "200":
          description: LUSD Chicken Bonds BAMM statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BammStats"
              example:
                timestamp: "2025-08-29T05:00:00Z"
                bamm_debt: 1525216.022184752
                bamm_apr_7d: 0
                bamm_apr_14d: 0
                bamm_apr_30d: 0

  /v2/ethereum.json:
    get:
      operationId: getEthereumProtocolStats
      summary: Ethereum Protocol Stats
      description: >
        Returns comprehensive V2 (BOLD) protocol stats for Ethereum mainnet
        including total_bold_supply, total_debt_pending, total_coll_value,
        total_sp_deposits, total_value_locked, max_sp_apy, per-collateral
        branch data (WETH, wstETH, rETH), sBOLD and yBOLD vault metrics,
        boldYield opportunities, and current token prices.
      tags:
        - V2 Protocol Stats
      responses:
        "200":
          description: Ethereum mainnet V2 protocol stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolStats"

  /v2/mainnet.json:
    get:
      operationId: getMainnetProtocolStats
      summary: Mainnet Legacy Protocol Stats
      description: >
        Returns V2 legacy deployment stats for Ethereum mainnet with the same
        schema as ethereum.json but scoped to the original V2 contract
        deployment.
      tags:
        - V2 Protocol Stats
      responses:
        "200":
          description: Ethereum mainnet legacy V2 protocol stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolStats"

  /v2/testnet/sepolia.json:
    get:
      operationId: getSepoliaTestnetStats
      summary: Sepolia Testnet Stats
      description: Returns V2 protocol stats for the Sepolia testnet deployment.
      tags:
        - V2 Protocol Stats
      responses:
        "200":
          description: Sepolia testnet V2 protocol stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolStats"

  /v2/website/bold-venues.json:
    get:
      operationId: getBoldYieldVenues
      summary: BOLD Yield Venues
      description: >
        Returns an array of yield opportunities for BOLD across DeFi protocols
        (e.g., Euler, Yearn, Asymmetry). Each entry includes protocol name,
        asset/vault name, link, weekly APR, total APR range, and TVL.
      tags:
        - V2 Website Data
      responses:
        "200":
          description: List of BOLD yield opportunities.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YieldVenue"
              example:
                - protocol: Euler
                  asset: BOLD Vault
                  link: https://app.euler.finance/vault/0xC1C51C5c9EfaF0c485Aa1097AE9690B5e102975A
                  weekly_apr: 0.10333863505351129
                  total_apr: "21.5% - 103.1%"
                  tvl: 148921.61027224179

  /v2/website/fork-venues.json:
    get:
      operationId: getForkVenues
      summary: Fork Venues
      description: Returns data on Liquity protocol fork deployments and venues.
      tags:
        - V2 Website Data
      responses:
        "200":
          description: List of Liquity protocol fork venues.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YieldVenue"

  /v2/website/leaderboard.json:
    get:
      operationId: getPointsLeaderboard
      summary: Points Leaderboard
      description: >
        Returns a ranked leaderboard of Ethereum addresses by accumulated
        Liquity points, including rank, address, points earned, and percentage
        share. Contains up to 1,900+ entries.
      tags:
        - V2 Website Data
      responses:
        "200":
          description: Points leaderboard with ranked Ethereum addresses.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"
              example:
                total_row_count: 1907
                rows:
                  - rank: 1
                    address: "0xc83aa8e0da4ffc388fdbfc1cb111d8d625b5b8e7"
                    points: 632014.0793235414
                    percent: 0.05085206108535175
                  - rank: 2
                    address: "0xceb63486c7ec2896b399e2d967c567d8c05f673a"
                    points: 451653.63560210326
                    percent: 0.036340200350666235

  /v2/website/borrow-rates.json:
    get:
      operationId: getBorrowRatesComparison
      summary: Borrow Rates Comparison
      description: >
        Returns average borrow rate comparison per collateral type (WETH,
        wstETH, rETH) between Liquity V2 and DeFi-wide averages.
      tags:
        - V2 Website Data
      responses:
        "200":
          description: Borrow rate comparison by collateral type.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BorrowRateComparison"
              example:
                - collateral: WETH
                  defi_avg_borrow_rate: 0.04535838926497226
                  liquity_avg_borrow_rate: 0.022137661065511436
                - collateral: wstETH
                  defi_avg_borrow_rate: 0.039
                  liquity_avg_borrow_rate: 0.018
                - collateral: rETH
                  defi_avg_borrow_rate: 0.041
                  liquity_avg_borrow_rate: 0.019

  /v2/governance/initiatives.json:
    get:
      operationId: getGovernanceInitiatives
      summary: Governance Initiatives
      description: >
        Returns a mapping of Ethereum addresses to governance initiative
        metadata, including whether each address is a bribe initiative and
        the associated bribe token address (or null).
      tags:
        - V2 Governance
      responses:
        "200":
          description: Map of governance initiative addresses to metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/GovernanceInitiative"
              example:
                "0xD533a949740bb3306d119CC777fa900bA034cd52":
                  isBribeInitiative: true
                  bribeToken: "0xD533a949740bb3306d119CC777fa900bA034cd52"
                "0x1234567890abcdef1234567890abcdef12345678":
                  isBribeInitiative: false
                  bribeToken: null

  /v2/governance/latest_completed_epoch.json:
    get:
      operationId: getLatestCompletedEpoch
      summary: Latest Completed Epoch
      description: >
        Returns the index number of the most recently completed governance
        epoch as a plain integer. Epoch cadence is weekly starting from
        epoch start timestamp 1746662400.
      tags:
        - V2 Governance
      responses:
        "200":
          description: Latest completed governance epoch index.
          content:
            application/json:
              schema:
                type: integer
                description: The index of the most recently completed governance epoch.
                example: 57

components:
  schemas:
    BammStats:
      type: object
      description: BAMM stability pool statistics for LUSD Chicken Bonds.
      properties:
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp when metrics were captured.
          example: "2025-08-29T05:00:00Z"
        bamm_debt:
          type: number
          format: double
          description: Outstanding BAMM debt amount.
          example: 1525216.022184752
        bamm_apr_7d:
          type: number
          description: 7-day annualized percentage rate for BAMM.
          example: 0
        bamm_apr_14d:
          type: number
          description: 14-day annualized percentage rate for BAMM.
          example: 0
        bamm_apr_30d:
          type: number
          description: 30-day annualized percentage rate for BAMM.
          example: 0
      required:
        - timestamp
        - bamm_debt
        - bamm_apr_7d
        - bamm_apr_14d
        - bamm_apr_30d

    BranchStats:
      type: object
      description: Per-collateral branch statistics for a Liquity V2 deployment.
      properties:
        coll_active:
          type: string
          description: Active collateral amount as numeric string.
        coll_default:
          type: string
          description: Defaulted collateral amount as numeric string.
        coll_price:
          type: string
          description: Current collateral price as numeric string.
        debt_recorded:
          type: string
          description: Recorded debt amount as numeric string.
        debt_default:
          type: string
          description: Defaulted debt amount as numeric string.
        sp_deposits:
          type: string
          description: Stability pool deposit amount as numeric string.
        interest_accrual_1y:
          type: string
          description: Annualized interest accrual as numeric string.
        interest_pending:
          type: string
          description: Pending interest amount as numeric string.
        batch_management_fees_pending:
          type: string
          description: Pending batch management fees as numeric string.
        coll:
          type: string
          description: Total collateral as numeric string.
        coll_value:
          type: string
          description: Total collateral value in USD as numeric string.
        debt_pending:
          type: string
          description: Pending debt as numeric string.
        debt_active:
          type: string
          description: Active debt as numeric string.
        debt:
          type: string
          description: Total debt as numeric string.
        value_locked:
          type: string
          description: Total value locked as numeric string.
        interest_rate_avg:
          type: string
          description: Average interest rate as numeric string.
        sp_apy:
          type: string
          description: Stability pool APY as numeric string.
        apy_avg:
          type: string
          description: Average APY as numeric string.
        sp_apy_avg_1d:
          type: string
          description: 1-day average stability pool APY as numeric string.
        sp_apy_avg_7d:
          type: string
          description: 7-day average stability pool APY as numeric string.

    YieldVenue:
      type: object
      description: A yield opportunity for BOLD in a DeFi protocol.
      properties:
        protocol:
          type: string
          description: Name of the DeFi protocol.
          example: Euler
        asset:
          type: string
          description: Asset or vault identifier.
          example: BOLD Vault
        link:
          type: string
          format: uri
          description: URL to access the yield opportunity.
          example: https://app.euler.finance/vault/0xC1C51C5c9EfaF0c485Aa1097AE9690B5e102975A
        weekly_apr:
          type: number
          description: Weekly annualized percentage rate as decimal.
          example: 0.10333863505351129
        total_apr:
          type: string
          description: Range of total APR as formatted string.
          example: "21.5% - 103.1%"
        tvl:
          type: number
          description: Total value locked in USD.
          example: 148921.61027224179
      required:
        - protocol
        - asset
        - link
        - weekly_apr
        - total_apr
        - tvl

    LeaderboardEntry:
      type: object
      description: A single entry in the Liquity points leaderboard.
      properties:
        rank:
          type: integer
          description: Leaderboard ranking position.
          example: 1
        address:
          type: string
          description: Ethereum wallet address.
          example: "0xc83aa8e0da4ffc388fdbfc1cb111d8d625b5b8e7"
        points:
          type: number
          description: Total Liquity points accumulated.
          example: 632014.0793235414
        percent:
          type: number
          description: Percentage share of total points (0-1 range).
          example: 0.05085206108535175
      required:
        - rank
        - address
        - points
        - percent

    Leaderboard:
      type: object
      description: Paginated leaderboard of Ethereum addresses by Liquity points.
      properties:
        total_row_count:
          type: integer
          description: Total number of entries in the leaderboard.
          example: 1907
        rows:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
          description: List of leaderboard entries.
      required:
        - total_row_count
        - rows

    BorrowRateComparison:
      type: object
      description: Borrow rate comparison between Liquity V2 and DeFi average for a collateral.
      properties:
        collateral:
          type: string
          description: Collateral token identifier (e.g., WETH, wstETH, rETH).
          example: WETH
        defi_avg_borrow_rate:
          type: number
          format: float
          description: Average borrow rate across DeFi protocols as decimal.
          example: 0.04535838926497226
        liquity_avg_borrow_rate:
          type: number
          format: float
          description: Average borrow rate on Liquity V2 as decimal.
          example: 0.022137661065511436
      required:
        - collateral
        - defi_avg_borrow_rate
        - liquity_avg_borrow_rate

    GovernanceInitiative:
      type: object
      description: Metadata for a Liquity V2 governance initiative.
      properties:
        isBribeInitiative:
          type: boolean
          description: Whether this initiative uses bribe mechanisms.
          example: true
        bribeToken:
          type:
            - string
            - "null"
          description: Ethereum token address used for bribes, or null if not a bribe initiative.
          example: "0xD533a949740bb3306d119CC777fa900bA034cd52"
      required:
        - isBribeInitiative
        - bribeToken

    ProtocolStats:
      type: object
      description: Comprehensive Liquity V2 (BOLD) protocol statistics snapshot.
      properties:
        total_bold_supply:
          type: string
          description: Total BOLD stablecoin supply as numeric string.
        total_debt_pending:
          type: string
          description: Total pending debt across all branches as numeric string.
        total_coll_value:
          type: string
          description: Total collateral value in USD as numeric string.
        total_sp_deposits:
          type: string
          description: Total stability pool deposits as numeric string.
        total_value_locked:
          type: string
          description: Total value locked in the protocol as numeric string.
        max_sp_apy:
          type: string
          description: Maximum stability pool APY across all branches as numeric string.
        branch:
          type: object
          description: Per-collateral branch statistics keyed by asset name (e.g., WETH, wstETH, rETH).
          additionalProperties:
            $ref: "#/components/schemas/BranchStats"
        boldYield:
          type: array
          description: List of BOLD yield opportunities.
          items:
            $ref: "#/components/schemas/YieldVenue"
        sBOLD:
          $ref: "#/components/schemas/YieldVenue"
        yBOLD:
          $ref: "#/components/schemas/YieldVenue"
        prices:
          type: object
          description: Current token prices keyed by symbol.
          additionalProperties:
            type: string
            description: Token price as numeric string.

tags:
  - name: V1 Supply
    description: Liquity V1 circulating supply and BAMM stats endpoints.
  - name: V2 Protocol Stats
    description: Liquity V2 (BOLD) protocol state snapshots for mainnet and testnet.
  - name: V2 Website Data
    description: Data feeds for the Liquity website including yield venues, leaderboard, and borrow rates.
  - name: V2 Governance
    description: Liquity V2 governance state including initiatives and epoch data.
